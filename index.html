<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matcha Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark: #1a1f0e;
      --matcha: #556b2f;
      --matcha-mid: #7a9442;
      --matcha-light: #adc178;
      --cream: #fefae0;
      --cream-dark: #f0ecc8;
      --green-glow: rgba(85,107,47,0.18);
      --working: #5cb85c;
      --untested: #e6a817;
      --broken: #c0392b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      font-family: 'Syne', sans-serif;
      color: var(--cream);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(85,107,47,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      background: var(--matcha);
      border-radius: 20px;
      margin-bottom: 20px;
      font-size: 28px;
      box-shadow: 0 0 40px var(--green-glow);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 30px var(--green-glow); }
      50% { box-shadow: 0 0 60px rgba(85,107,47,0.35); }
    }

    header h1 {
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 900;
      letter-spacing: -4px;
      line-height: 1;
      background: linear-gradient(135deg, var(--cream) 30%, var(--matcha-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--matcha-light);
      margin-top: 10px;
      opacity: 0.8;
    }

    /* NEW TIKTOK BUTTON */
    .tt-btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 18px;
      border-radius: 100px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(173,193,120,0.25);
      color: var(--cream);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-decoration: none;
      transition: all 0.25s ease;
    }

    .tt-btn:hover {
      background: rgba(85,107,47,0.15);
      border-color: var(--matcha-light);
      color: var(--matcha-light);
      box-shadow: 0 0 20px var(--green-glow);
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 32px;
    }

    .nav-btn {
      padding: 10px 16px;
      border-radius: 100px;
      background: rgba(255,255,255,0.04);
      color: rgba(254,250,224,0.5);
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      border: 1px solid rgba(173,193,120,0.2);
    }

    .nav-btn.active {
      background: var(--matcha);
      color: var(--cream);
    }

    .card {
      background: rgba(254,250,224,0.04);
      border-radius: 28px;
      padding: 28px;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    footer {
      text-align: center;
      margin-top: 48px;
      font-size: 10px;
      color: rgba(254,250,224,0.2);
    }
  </style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="logo-mark">🍵</div>
    <h1>MATCHA</h1>
    <div class="tagline">PREMIUM WEB EXECUTOR PORTAL</div>

    <!-- 🔥 TIKTOK BUTTON -->
    <a href="https://www.tiktok.com/@matcha.js" target="_blank" class="tt-btn">
      🎵 @matcha.js
    </a>
  </header>

  <nav>
    <button class="nav-btn active" onclick="show('home', this)">MAIN</button>
    <button class="nav-btn" onclick="show('download', this)">DOWNLOAD</button>
    <button class="nav-btn" onclick="show('credits', this)">CREDITS</button>
  </nav>

  <div class="card">
    <div id="home" class="screen active">
      <h2>Welcome, Architect.</h2>
      <p>Matcha is a cross-platform web executor built for speed and precision.</p>
    </div>

    <div id="download" class="screen">
      <h2>Download</h2>
      <p>Choose your platform.</p>
    </div>

    <div id="credits" class="screen">
      <h2>Credits</h2>
      <p>Ven0x - Developer</p>
    </div>
  </div>

  <footer>&copy; 2026 MATCHA HUB</footer>
</div>

<script>
function show(id, btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
}
</script>

</body>
</html>
